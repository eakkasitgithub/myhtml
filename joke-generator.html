<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Joke Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 600px;
            width: 100%;
            text-align: center;
        }

        h1 {
            color: #333;
            margin-bottom: 30px;
            font-size: 2.5em;
        }

        .joke-box {
            background: #f8f9fa;
            border-left: 5px solid #667eea;
            padding: 25px;
            border-radius: 8px;
            margin-bottom: 30px;
            min-height: 100px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .joke-text {
            color: #555;
            font-size: 1.1em;
            line-height: 1.6;
            margin-bottom: 15px;
        }

        .joke-punchline {
            color: #667eea;
            font-size: 1em;
            font-style: italic;
            margin-top: 15px;
            display: none;
        }

        .joke-punchline.show {
            display: block;
        }

        .loading {
            color: #999;
            font-style: italic;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 1em;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin: 8px;
            font-weight: bold;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        .button-group {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .error {
            color: #dc3545;
            background: #f8d7da;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }

        .joke-type {
            color: #999;
            font-size: 0.9em;
            margin-top: 10px;
        }

        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }

            h1 {
                font-size: 1.8em;
            }

            .joke-text {
                font-size: 1em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>😂 Joke Generator</h1>
        
        <div class="error" id="error"></div>

        <div class="joke-box">
            <div class="joke-text" id="jokeText">Click the button below to get a random joke!</div>
            <div class="joke-punchline" id="punchline"></div>
            <div class="joke-type" id="jokeType"></div>
        </div>

        <div class="button-group">
            <button onclick="getJoke()">Get Joke</button>
            <button onclick="togglePunchline()">Show/Hide Answer</button>
        </div>
    </div>

    <script>
        let currentJoke = null;

        async function getJoke() {
            const jokeText = document.getElementById('jokeText');
            const punchline = document.getElementById('punchline');
            const jokeType = document.getElementById('jokeType');
            const errorDiv = document.getElementById('error');

            jokeText.textContent = 'Loading...';
            jokeText.classList.add('loading');
            punchline.classList.remove('show');
            errorDiv.style.display = 'none';

            try {
                // Using JokeAPI - Free API for jokes
                const response = await fetch('https://v2.jokeapi.dev/joke/Any');
                
                if (!response.ok) {
                    throw new Error('Failed to fetch joke');
                }

                const data = await response.json();

                // Handle both single and two-part jokes
                if (data.type === 'single') {
                    jokeText.textContent = data.joke;
                    punchline.textContent = '';
                    jokeType.textContent = '';
                    punchline.classList.remove('show');
                } else if (data.type === 'twopart') {
                    jokeText.textContent = data.setup;
                    punchline.textContent = data.delivery;
                    jokeType.textContent = `Category: ${data.category}`;
                }

                jokeText.classList.remove('loading');
                currentJoke = data;

            } catch (error) {
                console.error('Error:', error);
                jokeText.textContent = 'Oops! Could not fetch a joke. Please try again!';
                jokeText.classList.remove('loading');
                errorDiv.textContent = error.message;
                errorDiv.style.display = 'block';
            }
        }

        function togglePunchline() {
            const punchline = document.getElementById('punchline');
            const jokeText = document.getElementById('jokeText');
            
            if (jokeText.textContent === 'Click the button below to get a random joke!' || 
                jokeText.classList.contains('loading')) {
                alert('Please get a joke first!');
                return;
            }

            punchline.classList.toggle('show');
        }

        // Load a joke when the page loads
        window.addEventListener('load', function() {
            getJoke();
        });

        // Allow Enter key to get new joke
        document.addEventListener('keypress', function(event) {
            if (event.key === 'Enter') {
                getJoke();
            }
        });
    </script>
</body>
</html>
